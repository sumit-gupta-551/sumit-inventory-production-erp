name: sssj
description: ERP Inventory & Production Management
publish_to: 'none'

version: 1.0.7+7

environment:
  sdk: ">=3.2.6 <5.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6

  # DATE / FORMAT
  intl: ^0.19.0

  # LOCAL DATABASE
  sqflite: ^2.3.2
  sqflite_common_ffi: ^2.3.2+1
  path: ^1.8.3

  # 🔥 FIREBASE (CORRECT POSITION)
  firebase_core: ^3.12.1
  cloud_firestore:  ^5.6.7
  firebase_database: ^11.3.5
  # FILE / PDF / EXPORT
  pdf: ^3.10.8
  printing: ^5.12.0
  file_picker: ^8.0.0+1
  excel: ^4.0.6
  path_provider: ^2.1.2
  share_plus: ^7.2.2

  # FEATURES
  speech_to_text: ^7.0.0
  url_launcher: ^6.3.0
  telephony: ^0.2.0
  shared_preferences: ^2.2.3
  local_auth: ^2.2.0
  crypto: ^3.0.3
  open_filex: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/sssj.png
    - assets/mslogo.png